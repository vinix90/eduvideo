<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương trình bậc 2 - Trực quan hình học</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        h1 { font-size: 28px; font-weight: 700; margin: 16px 0 8px; background: linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        .container { max-width: 960px; width: 100%; background: #1e293b; border-radius: 20px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        
        canvas { width: 100%; max-height: 500px; background: #0f172a; border-radius: 12px; cursor: grab; display: block; }
        
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .ctrl-group { background: #0f172a; border-radius: 12px; padding: 14px 16px; }
        .ctrl-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .ctrl-group .value { float: right; color: #60a5fa; font-family: monospace; font-size: 15px; }
        input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: #334155; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #60a5fa; cursor: pointer; border: 2px solid #0f172a; }
        
        .info-panel { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .info-card { background: #0f172a; border-radius: 12px; padding: 12px 16px; text-align: center; }
        .info-card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .info-card .val { font-size: 20px; font-weight: 700; margin-top: 4px; font-family: monospace; }
        .info-card .val.red { color: #ef4444; }
        .info-card .val.green { color: #22c55e; }
        .info-card .val.blue { color: #60a5fa; }
        .info-card .val.yellow { color: #eab308; }
        .info-card .val.purple { color: #a78bfa; }
        
        .formula-box { margin-top: 16px; background: #0f172a; border-radius: 12px; padding: 16px; text-align: center; }
        .formula-box .eq { font-size: 18px; color: #e2e8f0; font-family: serif; font-style: italic; }
        .formula-box .highlight { color: #fbbf24; font-weight: 600; }
        
        @media (max-width: 640px) {
            .controls { grid-template-columns: 1fr; }
            .info-panel { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <h1>📐 Phương trình bậc 2 — Trực quan hình học</h1>
    <p class="subtitle">Kéo các thanh a, b, c để xem đồ thị thay đổi • Nghiệm = giao điểm với trục hoành</p>
    
    <div class="container">
        <canvas id="graph" width="900" height="500"></canvas>
        
        <div class="controls">
            <div class="ctrl-group">
                <label>a <span class="value" id="valA">1.00</span></label>
                <input type="range" id="sliderA" min="-5" max="5" step="0.05" value="1">
            </div>
            <div class="ctrl-group">
                <label>b <span class="value" id="valB">0.00</span></label>
                <input type="range" id="sliderB" min="-10" max="10" step="0.1" value="0">
            </div>
            <div class="ctrl-group">
                <label>c <span class="value" id="valC">-4.00</span></label>
                <input type="range" id="sliderC" min="-10" max="10" step="0.1" value="-4">
            </div>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <div class="info-card">
                <div class="label">Δ (Delta)</div>
                <div class="val blue" id="deltaVal">16</div>
            </div>
            <div class="info-card">
                <div class="label">Nghiệm x₁</div>
                <div class="val green" id="x1Val">2.00</div>
            </div>
            <div class="info-card">
                <div class="label">Nghiệm x₂</div>
                <div class="val red" id="x2Val">-2.00</div>
            </div>
            <div class="info-card">
                <div class="label">Đỉnh (x₀, y₀)</div>
                <div class="val purple" id="vertexVal">(0, -4)</div>
            </div>
        </div>
        
        <div class="formula-box" id="formulaBox">
            <span class="eq">y = <span id="eqText" class="highlight">x² - 4</span></span>
            <span style="margin-left: 20px; color: #64748b; font-size: 13px;">
                Δ = <span id="eqDelta">16</span> • x = [-b ± √Δ] / 2a
            </span>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        
        const W = 900, H = 500;
        canvas.width = W; canvas.height = H;
        
        // Graph bounds
        let xMin = -8, xMax = 8, yMin = -6, yMax = 6;
        let isDragging = false, dragStartX, dragStartY, dragXMin, dragYMin;
        
        function worldToScreen(x, y) {
            const sx = ((x - xMin) / (xMax - xMin)) * W;
            const sy = H - ((y - yMin) / (yMax - yMin)) * H;
            return [sx, sy];
        }
        
        function screenToWorld(sx, sy) {
            const x = (sx / W) * (xMax - xMin) + xMin;
            const y = yMax - (sy / H) * (yMax - yMin);
            return [x, y];
        }
        
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // Background grid
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            
            // Vertical grid lines
            for (let x = Math.floor(xMin); x <= Math.ceil(xMax); x++) {
                const [sx] = worldToScreen(x, 0);
                ctx.beginPath();
                ctx.moveTo(sx, 0); ctx.lineTo(sx, H);
                ctx.strokeStyle = x === 0 ? '#334155' : '#1e293b';
                ctx.lineWidth = x === 0 ? 2 : 1;
                ctx.stroke();
                if (x !== 0) {
                    ctx.fillStyle = '#475569';
                    ctx.font = '11px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(x, sx, H/2 + 16);
                }
            }
            
            // Horizontal grid lines
            for (let y = Math.floor(yMin); y <= Math.ceil(yMax); y++) {
                const [, sy] = worldToScreen(0, y);
                ctx.beginPath();
                ctx.moveTo(0, sy); ctx.lineTo(W, sy);
                ctx.strokeStyle = y === 0 ? '#334155' : '#1e293b';
                ctx.lineWidth = y === 0 ? 2 : 1;
                ctx.stroke();
                if (y !== 0) {
                    ctx.fillStyle = '#475569';
                    ctx.font = '11px monospace';
                    ctx.textAlign = 'right';
                    ctx.fillText(y, W/2 - 8, sy + 4);
                }
            }
            
            // Axis labels
            ctx.fillStyle = '#64748b';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('O', W/2 + 6, H/2 + 16);
            ctx.textAlign = 'center';
            ctx.fillText('x', W - 16, H/2 + 16);
            ctx.fillText('y', W/2 - 20, 16);
            
            // Get values
            const a = parseFloat(document.getElementById('sliderA').value);
            const b = parseFloat(document.getElementById('sliderB').value);
            const c = parseFloat(document.getElementById('sliderC').value);
            
            // Draw parabola
            ctx.beginPath();
            const steps = 300;
            let first = true;
            
            for (let i = 0; i <= steps; i++) {
                const x = xMin + (i / steps) * (xMax - xMin);
                const y = a * x * x + b * x + c;
                const [sx, sy] = worldToScreen(x, y);
                
                if (first) { ctx.moveTo(sx, sy); first = false; }
                else ctx.lineTo(sx, sy);
            }
            
            // Gradient stroke
            const grad = ctx.createLinearGradient(0, 0, W, 0);
            grad.addColorStop(0, '#60a5fa');
            grad.addColorStop(0.5, '#a78bfa');
            grad.addColorStop(1, '#f472b6');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Calculate roots
            const delta = b*b - 4*a*c;
            let x1 = NaN, x2 = NaN;
            let hasRoots = false;
            
            if (delta >= 0 && a !== 0) {
                x1 = (-b + Math.sqrt(delta)) / (2*a);
                x2 = (-b - Math.sqrt(delta)) / (2*a);
                hasRoots = true;
            } else if (a === 0 && b !== 0) {
                x1 = -c / b;
                hasRoots = true; // linear case
            }
            
            // Vertex
            const x0 = -b / (2*a);
            const y0 = a * x0 * x0 + b * x0 + c;
            
            // Draw roots
            if (hasRoots && a !== 0) {
                for (const xr of [x1, x2]) {
                    if (xr >= xMin && xr <= xMax) {
                        const [sx, sy] = worldToScreen(xr, 0);
                        // Glow
                        ctx.beginPath();
                        ctx.arc(sx, sy, 20, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(34, 197, 94, 0.1)';
                        ctx.fill();
                        // Point
                        ctx.beginPath();
                        ctx.arc(sx, sy, 8, 0, Math.PI * 2);
                        ctx.fillStyle = '#22c55e';
                        ctx.fill();
                        ctx.strokeStyle = '#166534';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        // Label
                        const label = xr === x1 ? 'x₁' : 'x₂';
                        ctx.fillStyle = '#22c55e';
                        ctx.font = 'bold 13px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText(label + '=' + xr.toFixed(2), sx, sy - 16);
                    }
                }
            }
            
            // Draw vertex
            if (a !== 0) {
                const [svx, svy] = worldToScreen(x0, y0);
                // Glow
                ctx.beginPath();
                ctx.arc(svx, svy, 18, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(251, 191, 36, 0.12)';
                ctx.fill();
                // Point
                ctx.beginPath();
                ctx.arc(svx, svy, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#fbbf24';
                ctx.fill();
                ctx.strokeStyle = '#92400e';
                ctx.lineWidth = 2;
                ctx.stroke();
                // Label
                ctx.fillStyle = '#fbbf24';
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Đỉnh (' + x0.toFixed(2) + ', ' + y0.toFixed(2) + ')', svx, svy - 18);
            }
            
            // Draw discriminant visualization (when applicable)
            if (a !== 0 && delta >= 0 && x1 !== x2) {
                // Highlight area between roots
                if (a > 0) {
                    // Positive a: graph above axis between roots
                    ctx.beginPath();
                    for (let i = 0; i <= steps; i++) {
                        const x = xMin + (i / steps) * (xMax - xMin);
                        const y = a * x * x + b * x + c;
                        const [sx, sy] = worldToScreen(x, y);
                        if (i === 0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                    }
                    ctx.lineTo(worldToScreen(xMax, 0)[0], worldToScreen(0, 0)[1]);
                    ctx.lineTo(worldToScreen(xMin, 0)[0], worldToScreen(0, 0)[1]);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(99, 102, 241, 0.06)';
                    ctx.fill();
                }
                
                // Draw distance between roots
                const [sx1] = worldToScreen(x1, 0);
                const [sx2] = worldToScreen(x2, 0);
                ctx.beginPath();
                ctx.moveTo(sx1, H/2 + 24);
                ctx.lineTo(sx2, H/2 + 24);
                ctx.strokeStyle = '#a78bfa';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Distance label
                const dist = Math.abs(x2 - x1);
                ctx.fillStyle = '#a78bfa';
                ctx.font = '11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('|x₁ - x₂| = ' + dist.toFixed(2), (sx1 + sx2)/2, H/2 + 40);
            }
            
            // Update info
            updateInfo(a, b, c, delta, x1, x2, hasRoots, x0, y0);
        }
        
        function updateInfo(a, b, c, delta, x1, x2, hasRoots, x0, y0) {
            document.getElementById('valA').textContent = a.toFixed(2);
            document.getElementById('valB').textContent = b.toFixed(2);
            document.getElementById('valC').textContent = c.toFixed(2);
            
            const d = Math.round(delta * 100) / 100;
            document.getElementById('deltaVal').textContent = (delta >= 0) ? d.toFixed(2) : d.toFixed(2);
            document.getElementById('deltaVal').style.color = delta >= 0 ? '#22c55e' : '#ef4444';
            
            if (hasRoots && a !== 0 && delta >= 0) {
                document.getElementById('x1Val').textContent = (Math.max(x1,x2)).toFixed(2);
                document.getElementById('x2Val').textContent = (Math.min(x1,x2)).toFixed(2);
            } else if (a === 0 && b !== 0) {
                document.getElementById('x1Val').textContent = x1.toFixed(2);
                document.getElementById('x2Val').textContent = '—';
            } else {
                document.getElementById('x1Val').textContent = '—';
                document.getElementById('x2Val').textContent = '—';
            }
            
            document.getElementById('vertexVal').textContent = `(${x0.toFixed(2)}, ${y0.toFixed(2)})`;
            
            // Build equation string
            let eq = '';
            if (a === 0) eq = (b !== 0) ? `${b.toFixed(2)}x ${c >= 0 ? '+ ' : '- '}${Math.abs(c).toFixed(2)}` : c.toFixed(2);
            else {
                eq = (a === 1 ? '' : a === -1 ? '-' : a.toFixed(2).replace(/\.?0+$/, '')) + 'x²';
                if (b !== 0) eq += (b > 0 ? ' + ' : ' - ') + (Math.abs(b) === 1 ? '' : Math.abs(b).toFixed(2).replace(/\.?0+$/, '')) + 'x';
                if (c !== 0) eq += (c > 0 ? ' + ' : ' - ') + Math.abs(c).toFixed(2).replace(/\.?0+$/, '');
                if (c === 0 && b === 0 && (a === 1 || a === -1)) eq = (a === 1 ? '' : '-') + 'x²';
            }
            document.getElementById('eqText').textContent = eq;
            document.getElementById('eqDelta').textContent = (Math.round(delta*100)/100).toFixed(2);
        }
        
        // Canvas interaction - drag to pan
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            dragStartX = e.clientX - rect.left;
            dragStartY = e.clientY - rect.top;
            dragXMin = xMin;
            dragYMin = yMin;
            canvas.style.cursor = 'grabbing';
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const scaleX = (xMax - xMin) / W;
                const scaleY = (yMax - yMin) / H;
                xMin = dragXMin - (mx - dragStartX) * scaleX;
                xMax = xMin + (xMax - dragXMin) + (mx - dragStartX) * scaleX;
                yMin = dragYMin + (my - dragStartY) * scaleY;
                yMax = yMin + (yMax - dragYMin) - (my - dragStartY) * scaleY;
                draw();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            dragStartX = t.clientX - rect.left;
            dragStartY = t.clientY - rect.top;
            dragXMin = xMin; dragYMin = yMin;
            isDragging = true;
        }, {passive: true});
        
        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const t = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const mx = t.clientX - rect.left;
                const my = t.clientY - rect.top;
                const scaleX = (xMax - xMin) / W;
                const scaleY = (yMax - yMin) / H;
                xMin = dragXMin - (mx - dragStartX) * scaleX;
                xMax = xMin + (xMax - dragXMin) + (mx - dragStartX) * scaleX;
                yMin = dragYMin + (my - dragStartY) * scaleY;
                yMax = yMin + (yMax - dragYMin) - (my - dragStartY) * scaleY;
                draw();
            }
        }, {passive: true});
        
        canvas.addEventListener('touchend', () => { isDragging = false; }, {passive: true});
        
        // Zoom with mouse wheel
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
            const cx = (xMin + xMax) / 2;
            const cy = (yMin + yMax) / 2;
            const newW = (xMax - xMin) * zoomFactor;
            const newH = (yMax - yMin) * zoomFactor;
            xMin = cx - newW / 2;
            xMax = cx + newW / 2;
            yMin = cy - newH / 2;
            yMax = cy + newH / 2;
            draw();
        }, {passive: false});
        
        // Slider events
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            slider.addEventListener('input', draw);
        });
        
        // Initial draw
        canvas.style.cursor = 'grab';
        draw();
    </script>
</body>
</html>

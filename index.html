<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduVideo - Học Online qua Video cho Lớp 1-12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f5ff;color:#1e293b;line-height:1.6;transition:background .4s}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
/* HEADER */
header{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:14px 20px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-icon{font-size:28px}
.logo-text{font-size:22px;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* HERO */
.hero{background:linear-gradient(135deg,#2563eb,#1d4ed8 40%,#7c3aed 100%);color:#fff;padding:56px 0 44px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero h1{font-size:40px;font-weight:800;margin-bottom:10px;position:relative;z-index:1}
.hero p{font-size:17px;opacity:.92;max-width:520px;margin:0 auto 24px;position:relative;z-index:1}
.hero-search{display:flex;max-width:500px;margin:0 auto;background:#fff;border-radius:50px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);position:relative;z-index:1}
.hero-search input{flex:1;border:none;padding:16px 24px;font-size:15px;outline:none;font-family:inherit}
.hero-search button{background:#1d4ed8;color:#fff;border:none;padding:16px 32px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.hero-search button:hover{background:#1e40af}
/* GRADE BUTTONS */
.grade-buttons{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin:32px auto;max-width:900px}
.grade-btn{display:flex;flex-direction:column;align-items:center;padding:16px 8px;border-radius:16px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .25s;font-family:inherit;border-top:4px solid #2563eb;position:relative;overflow:hidden}
.grade-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(37,99,235,.12);border-color:#2563eb}
.grade-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;transform:translateY(-3px);box-shadow:0 8px 24px rgba(37,99,235,.2)}
.grade-btn .grade-label{font-size:18px;font-weight:700}
.grade-btn .grade-range{font-size:11px;opacity:.7;margin-top:2px}
.grade-btn.active .grade-range{opacity:.9}
/* SUBJECT TABS */
.subject-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:24px 0}
.subject-btn{padding:12px 24px;border:2px solid #e2e8f0;background:#fff;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.subject-btn:hover{border-color:#2563eb;color:#2563eb}
.subject-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
/* CHAPTER GRID */
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.chapter-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 24px rgba(37,99,235,.06);cursor:pointer;transition:all .3s;border:1px solid #e2e8f0}
.chapter-card:hover{box-shadow:0 8px 32px rgba(37,99,235,.12);transform:translateY(-3px);border-color:#2563eb}
.chapter-card .chapter-num{font-size:13px;font-weight:600;color:#2563eb;text-transform:uppercase;letter-spacing:1px}
.chapter-card h3{font-size:17px;margin:8px 0 4px;font-weight:700}
.badge-ready{display:inline-block;padding:3px 10px;background:#d1fae5;color:#059669;border-radius:6px;font-size:12px;margin-top:8px}
.badge-updating{display:inline-block;padding:3px 10px;background:#fef3c7;color:#d97706;border-radius:6px;font-size:12px;margin-top:8px}
/* LESSON GRID */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:12px 0}
.lesson-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;border:1px solid #e2e8f0;transition:all .25s;text-align:center}
.lesson-card:hover{box-shadow:0 8px 24px rgba(37,99,235,.12);transform:translateY(-2px);border-color:#2563eb}
.lesson-card.active{background:#2563eb;color:#fff;border-color:#2563eb}
.lesson-card.active .l-icon{filter:brightness(10)}
.lesson-card .l-icon{font-size:32px;margin-bottom:6px}
.lesson-card h4{font-size:14px;font-weight:600}
/* VIDEO GRID */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.video-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(37,99,235,.06);cursor:pointer;transition:all .3s;border:1px solid #e2e8f0}
.video-card:hover{box-shadow:0 8px 32px rgba(37,99,235,.12);transform:translateY(-3px)}
.video-card .thumb{width:100%;aspect-ratio:16/9;background:#e2e8f0;position:relative;overflow:hidden}
.video-card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.video-card:hover .thumb img{transform:scale(1.05)}
.video-card .thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.85;transition:opacity .2s,transform .2s}
.video-card:hover .thumb .play{opacity:1;transform:scale(1.1)}
.v-info{padding:16px}
.v-info h4{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.4}
.v-info .channel{font-size:13px;color:#64748b}
.v-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.back-btn{padding:10px 20px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.back-btn:hover{background:#f1f5f9}
.breadcrumb{font-size:13px;color:#64748b;margin-bottom:8px}
.breadcrumb span{cursor:pointer}
.breadcrumb span:hover{color:#2563eb;text-decoration:underline}
/* PLAYER MODAL */
.player-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s}
.player-box{width:100%;max-width:960px;background:#0f172a;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.player-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#1e293b}
.player-top span{color:#fff;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:12px}
.player-top button{background:#ef4444;border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;transition:background .2s}
.player-top button:hover{background:#dc2626}
.player-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.player-frame iframe{width:100%;height:100%;border:none}
/* SECTIONS */
.section{padding:40px 0;transition:opacity .3s}
.section-title{font-size:26px;font-weight:700;margin-bottom:8px}
.section-subtitle{color:#64748b;font-size:15px;margin-bottom:20px}
/* STATS */
.stats{display:flex;justify-content:center;gap:32px;background:#fff;border-radius:16px;padding:28px 20px;box-shadow:0 4px 24px rgba(37,99,235,.06);flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:100px}
.stat-num{display:block;font-size:32px;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{color:#64748b;font-size:14px}
/* RANDOM */
.fun-section{text-align:center;margin-top:24px}
.random-btn{padding:16px 36px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s;box-shadow:0 4px 20px rgba(37,99,235,.3)}
.random-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(37,99,235,.4)}
.random-btn:active{transform:scale(.95)}
.random-result{margin-top:12px;padding:16px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;display:none;max-width:500px;margin-left:auto;margin-right:auto;transition:all .3s}
.random-result.show{display:block;animation:fadeIn .5s}
.random-result h4{font-size:15px;font-weight:600;color:#2563eb;margin-bottom:4px}
.random-result p{font-size:13px;color:#64748b}
.random-result .play-now{display:inline-block;margin-top:8px;padding:8px 20px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;cursor:pointer;transition:background .2s}
.random-result .play-now:hover{background:#1d4ed8}
/* YOUTUBE SEARCH */
.yt-box{display:flex;gap:12px;max-width:600px;margin-top:16px;margin-bottom:24px}
.yt-box input{flex:1;padding:14px 20px;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s}
.yt-box input:focus{border-color:#2563eb}
.btn-primary{padding:14px 28px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-primary:hover{background:#1d4ed8}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:#64748b}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}
/* FOOTER */
footer{background:#1e293b;color:#94a3b8;padding:32px 0;text-align:center;font-size:14px}
/* DARK MODE */
.dark-mode{background:#0f172a;color:#e2e8f0}
.dark-mode header{background:rgba(30,41,59,.95)!important;border-color:#334155}
.dark-mode .grade-btn{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark-mode .grade-btn.active{background:#2563eb;color:#fff}
.dark-mode .subject-btn{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark-mode .subject-btn.active{background:#2563eb;color:#fff}
.dark-mode .chapter-card{background:#1e293b;border-color:#334155}
.dark-mode .lesson-card{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark-mode .lesson-card.active{background:#2563eb;color:#fff}
.dark-mode .video-card{background:#1e293b;border-color:#334155}
.dark-mode .video-card .v-info h4{color:#e2e8f0}
.dark-mode .stats{background:#1e293b}
.dark-mode .random-result{background:#1e293b;border-color:#334155}
.dark-mode .hero-search input{background:#1e293b;color:#e2e8f0}
.dark-mode .yt-box input{background:#1e293b;color:#e2e8f0;border-color:#334155}
.dark-mode .back-btn{background:#1e293b;color:#e2e8f0;border-color:#334155}
.dark-mode .back-btn:hover{background:#334155}
/* THEME TOGGLE */
.theme-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:20px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all .3s;background:#1e293b;color:#fbbf24}
.theme-btn:hover{transform:scale(1.1)}
.dark-mode .theme-btn{background:#fbbf24;color:#1e293b}
/* TOAST */
.toast{position:fixed;bottom:80px;right:20px;background:#059669;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideUp .3s;max-width:300px}
.toast.error{background:#dc2626}
/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:28px}
.hero p{font-size:15px}
.hero-search{flex-direction:column;border-radius:16px}
.hero-search button{border-radius:0}
.grade-buttons{grid-template-columns:repeat(3,1fr);gap:8px}
.grade-btn{padding:12px 6px}
.grade-btn .grade-label{font-size:16px}
.video-grid,.chapter-grid{grid-template-columns:1fr}
.lesson-grid{grid-template-columns:repeat(2,1fr)}
.stats{gap:16px}
.section{padding:24px 0}
.section-title{font-size:22px}
.yt-box{flex-direction:column}
.yt-box input{width:100%}
.player-modal{padding:8px}
.player-top{padding:10px 14px}
.player-top span{font-size:12px}
}
@media(max-width:480px){
.grade-buttons{grid-template-columns:repeat(2,1fr)}
.lesson-grid{grid-template-columns:1fr}
}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
.dark-mode::-webkit-scrollbar-thumb{background:#475569}
</style>
</head>

// ====== SEARCH IN DATA ======
function searchInData(query) {
  const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const results = [];
  for (const key of Object.keys(K)) {
    const subj = K[key];
    if (!subj.ch) continue;
    const sn = SN[key.replace(/\d+/g,'')] || '';
    const gn = key.replace(/[a-z]/g,'');
    for (let ci = 0; ci < subj.ch.length; ci++) {
      const ch = subj.ch[ci];
      if (!ch.lessons) continue;
      for (let li = 0; li < ch.lessons.length; li++) {
        const le = ch.lessons[li];
        const searchText = (sn + ' ' + gn + ' ' + ch.t + ' ' + le.t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (searchText.includes(q)) {
          results.push({key, ci, li, gn: subj.n, cn: ch.t, ln: le.t, vs: le.v||[]});
        }
      }
    }
  }
  return results;
}

// ====== SHOW SEARCH RESULTS ======
function showSearchResults(results, query) {
  closeAllSections();
  // Show results in a special section
  const sec = document.getElementById('subSec');
  document.getElementById('gTitle').textContent = '🔎 Kết quả tìm "' + query + '" (' + results.length + ' kết quả)';
  document.getElementById('subTabs').innerHTML = `<button class="back-btn" id="clearSearch" style="margin-bottom:12px">← Xóa tìm kiếm</button>
    <div style="width:100%"></div>
  `;
  document.getElementById('subTabs').innerHTML += results.map((r,i) => `
    <div class="chapter-card" data-sr="${i}" style="width:100%;margin-bottom:8px;cursor:pointer">
      <div class="chapter-num">${r.gn} · ${r.cn}</div>
      <h3>${r.ln}</h3>
      ${r.vs.length ? '<span class="badge-ready">✅ '+r.vs.length+' video</span>' : '<span class="badge-updating">🔎 Click để xem</span>'}
    </div>
  `).join('');
  sec.style.display = 'block';

  document.getElementById('subTabs').onclick = e => {
    const card = e.target.closest('.chapter-card');
    if (!card) return;
    const idx = parseInt(card.dataset.sr);
    const r = results[idx];
    if (!r) return;
    // Navigate to this lesson
    g = r.key.replace(/[a-z]/g,'');
    s = r.key.replace(/\d+/g,'');
    c = r.ci;
    l = r.li;
    closeAllSections();
    // Set grade active
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
    const gb = document.querySelector(`.grade-btn[data-g="${g}"]`);
    if (gb) gb.classList.add('active');
    // Show subjects then navigate
    showSubs();
    document.querySelectorAll('.subject-btn').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.s === s) b.classList.add('active');
    });
    document.getElementById('chSec').style.display = 'block';
    showLessons();
    showVids();
    window.scrollTo({top: document.getElementById('vidSec').offsetTop - 80, behavior:'smooth'});
  };

  const clearBtn = document.getElementById('clearSearch');
  if (clearBtn) {
    clearBtn.onclick = () => {
      if (g) { showSubs(); } else { closeAllSections(); }
    };
  }
}

// ====== STATS ======
let totalVideos = 0;
const allVideos = [];
for (const key of Object.keys(K)) {
  const subj = K[key];
  if (!subj.ch) continue;
  for (let ci = 0; ci < subj.ch.length; ci++) {
    const ch = subj.ch[ci];
    if (!ch.lessons) continue;
    for (let li = 0; li < ch.lessons.length; li++) {
      const vs = ch.lessons[li].v || [];
      vs.forEach(v => {
        if (v.i && v.i.length === 11) {
          allVideos.push({key, ci, li, v, gn: subj.n, cn: ch.t, ln: ch.lessons[li].t});
        }
      });
      totalVideos += vs.filter(x => x.i && x.i.length === 11).length;
    }
  }
}

document.getElementById('stats').innerHTML = `
  <div class="stat-item"><span class="stat-num">12</span><span class="stat-label">Khối lớp</span></div>
  <div class="stat-item"><span class="stat-num">${Object.keys(K).length}</span><span class="stat-label">Môn học</span></div>
  <div class="stat-item"><span class="stat-num">${totalVideos}</span><span class="stat-label">Video</span></div>
`;

// ====== RANDOM ======
document.getElementById('randomBtn').onclick = () => {
  if (!allVideos.length) return;
  const r = allVideos[Math.floor(Math.random() * allVideos.length)];
  const res = document.getElementById('randomResult');
  if (!res) return;
  const safeTitle = r.v.n.replace(/'/g,"\\'");
  res.innerHTML = `
    <h4>🎯 ${r.v.n}</h4>
    <p>📂 ${r.gn} · ${r.cn} · ${r.ln} · 👨‍🏫 ${r.v.c||'YouTube'}</p>
    <span class="play-now" onclick="playVideo('${r.v.i}','${safeTitle}')">▶️ Xem ngay</span>`;
  res.classList.add('show');
};

// ====== LOGO CLICK ======
document.getElementById('logoHome').onclick = () => {
  [g,s,c,l] = [null,null,null,null];
  closeAllSections();
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  window.scrollTo({top: 0, behavior:'smooth'});
};

// ====== TOAST ======
function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ====== DARK MODE ======
const themeBtn = document.getElementById('themeBtn');
if (localStorage.getItem('eduvideo-theme') === 'dark') {
  document.body.classList.add('dark-mode');
  themeBtn.textContent = '☀️';
}
themeBtn.onclick = () => {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  themeBtn.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('eduvideo-theme', isDark ? 'dark' : 'light');
};
</script>
</body>
</html>
